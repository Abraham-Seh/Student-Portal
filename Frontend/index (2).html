<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSKMCS — Student Management</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e0d8;
      --border2: #ccc9be;
      --text: #1a1917;
      --text2: #6b6860;
      --text3: #9c9a93;
      --accent: #2563eb;
      --accent-light: #eff4ff;
      --accent-text: #1d4ed8;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --red: #dc2626;
      --red-light: #fef2f2;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --purple: #7c3aed;
      --purple-light: #f5f3ff;
      --sidebar-w: 240px;
      --header-h: 60px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Layout */
    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform 0.25s;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .content {
      padding: 28px;
      flex: 1;
    }

    /* Sidebar */
    .sidebar-logo {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-text {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-top: 1px;
    }

    .nav {
      padding: 12px 10px;
      flex: 1;
    }

    .nav-group {
      margin-bottom: 20px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all 0.15s;
      margin-bottom: 1px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent-text);
      font-weight: 500;
    }

    .nav-icon {
      font-size: 16px;
      width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .admin-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .admin-info {
      flex: 1;
      min-width: 0;
    }

    .admin-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .admin-role {
      font-size: 11px;
      color: var(--text3);
    }

    /* Topbar */
    .topbar-title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      background: var(--accent-text);
    }

    .btn.danger {
      background: var(--red-light);
      color: var(--red);
      border-color: #fca5a5;
    }

    .btn.danger:hover {
      background: #fee2e2;
    }

    .btn.sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn.icon-only {
      padding: 7px;
    }

    /* Cards & Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    .stat-card.blue .stat-value {
      color: var(--accent);
    }

    .stat-card.green .stat-value {
      color: var(--green);
    }

    .stat-card.amber .stat-value {
      color: var(--amber);
    }

    .stat-card.purple .stat-value {
      color: var(--purple);
    }

    /* Table */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .table-title {
      font-size: 14px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      text-align: left;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 13px 20px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #fafaf8;
    }

    .id-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      color: var(--text2);
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .table-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge.active {
      background: var(--green-light);
      color: var(--green);
    }

    .badge.inactive {
      background: var(--surface2);
      color: var(--text2);
    }

    .badge.graduated {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge.suspended {
      background: var(--red-light);
      color: var(--red);
    }

    .badge.enrolled {
      background: var(--accent-light);
      color: var(--accent-text);
    }

    .badge.completed {
      background: var(--green-light);
      color: var(--green);
    }

    .badge.dropped {
      background: var(--amber-light);
      color: var(--amber);
    }

    .badge.failed {
      background: var(--red-light);
      color: var(--red);
    }

    /* Grade badge */
    .grade {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }

    .grade-A {
      color: var(--green);
    }

    .grade-B {
      color: var(--accent);
    }

    .grade-C {
      color: var(--amber);
    }

    .grade-D,
    .grade-F {
      color: var(--red);
    }

    /* Search & Filters */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-input {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      outline: none;
      width: 220px;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    .select-input {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .select-input:focus {
      border-color: var(--accent);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-foot {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid.single {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.span2 {
      grid-column: span 2;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
    }

    input,
    textarea,
    select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Auth page */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 24px;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 6px;
    }

    .auth-sub {
      font-size: 14px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-field {
      margin-bottom: 16px;
    }

    .auth-btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .auth-btn:hover {
      background: var(--accent-text);
    }

    .error-msg {
      background: var(--red-light);
      border: 1px solid #fca5a5;
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .success-msg {
      background: var(--green-light);
      border: 1px solid #86efac;
      color: var(--green);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* Detail panel */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .detail-label {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 500;
      background: var(--text);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.25s ease;
    }

    .toast.success {
      background: var(--green);
    }

    .toast.error {
      background: var(--red);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    .page-info {
      font-size: 12px;
      color: var(--text3);
    }

    .page-btns {
      display: flex;
      gap: 4px;
    }

    .page-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text2);
    }

    .page-btn:hover {
      background: var(--surface2);
    }

    .page-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text3);
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty-text {
      font-size: 14px;
    }

    /* Section card */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .section-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
    }

    .section-body {
      padding: 20px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--text2);
    }

    .actions {
      display: flex;
      gap: 6px;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: none;
      }

      .main {
        margin-left: 0;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-grid .span2 {
        grid-column: span 1;
      }

      .two-col {
        grid-template-columns: 1fr;
      }

      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, createContext, useContext } = React;

// ─── Mock API (replace BASE_URL with your backend) ────────────────────────────
const BASE_URL = 'http://localhost:5000/api';

const api = {
  token: localStorage.getItem('token'),
  setToken(t) { this.token = t; if(t) localStorage.setItem('token',t); else localStorage.removeItem('token'); },
  headers() { return { 'Content-Type':'application/json', ...(this.token ? {Authorization:`Bearer ${this.token}`} : {}) }; },
  async req(method, path, body) {
    const r = await fetch(`${BASE_URL}${path}`, { method, headers: this.headers(), ...(body ? {body: JSON.stringify(body)} : {}) });
    const d = await r.json();
    if (!d.success) throw new Error(d.message || 'Request failed');
    return d;
  },
  get(p) { return this.req('GET', p); },
  post(p, b) { return this.req('POST', p, b); },
  put(p, b) { return this.req('PUT', p, b); },
  del(p) { return this.req('DELETE', p); },
};

// ─── Mock data for demo (when backend is not connected) ───────────────────────
const MOCK = {
  stats: { totalStudents: 248, activeStudents: 201, totalCourses: 18, totalEnrollments: 612, graduatedStudents: 32 },
  students: Array.from({length: 12}, (_, i) => ({
    id: i+1, studentId: `STU-2024-${10001+i}`,
    name: ['Alice Johnson','Bob Williams','Carol Davis','David Brown','Emma Wilson','Frank Miller',
           'Grace Lee','Henry Clark','Iris Tang','James Park','Kate Moore','Liam Chen'][i],
    email: `student${i+1}@example.com`, phone: `+123456789${i}`,
    status: ['ACTIVE','ACTIVE','ACTIVE','GRADUATED','ACTIVE','INACTIVE','ACTIVE','ACTIVE','ACTIVE','ACTIVE','SUSPENDED','ACTIVE'][i],
    createdAt: new Date(2024, i%12, (i*2)+1).toISOString(),
    enrollments: [
      {id:i*3+1, courseId:1, grade:['A','B+','A-','B','C+'][i%5], score:[95,88,92,85,78][i%5], status:'COMPLETED', course:{name:'Intro to CS', code:'CS101'}},
      {id:i*3+2, courseId:2, grade:['B','A','C+','A-','B+'][i%5], score:[85,95,78,92,88][i%5], status:'COMPLETED', course:{name:'Calculus I', code:'MATH201'}},
    ]
  })),
  courses: Array.from({length: 8}, (_, i) => ({
    id: i+1, code: ['CS101','MATH201','ENG101','PHYS101','BIO101','CS201','HIST101','CHEM101'][i],
    name: ['Intro to Computer Science','Calculus I','English Composition','Physics I','Biology I','Data Structures','World History','Chemistry I'][i],
    instructor: ['Dr. Smith','Prof. Johnson','Dr. Williams','Prof. Davis','Dr. Martinez','Dr. Chen','Prof. Adams','Dr. Taylor'][i],
    credits: [3,4,3,4,3,3,3,4][i], capacity: [30,25,20,25,30,25,20,25][i], semester: 'Fall 2024',
    description: 'Comprehensive course covering fundamental concepts.',
    _count: { enrollments: [28,22,18,20,25,15,12,19][i] },

// ─── Context ──────────────────────────────────────────────────────────────────
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{type === 'success' ? '✓' : '✕'} {msg}</div>;
}

function Spinner() { return <div className="loading"><div className="spinner"></div></div>; }

function Badge({ status }) {
  const map = { ACTIVE:'active', INACTIVE:'inactive', GRADUATED:'graduated', SUSPENDED:'suspended',
                ENROLLED:'enrolled', COMPLETED:'completed', DROPPED:'dropped', FAILED:'failed' };
  const labels = { ACTIVE:'Active', INACTIVE:'Inactive', GRADUATED:'Graduated', SUSPENDED:'Suspended',
                   ENROLLED:'Enrolled', COMPLETED:'Completed', DROPPED:'Dropped', FAILED:'Failed' };
  return <span className={`badge ${map[status]||'inactive'}`}>{labels[status]||status}</span>;
}

function GradeTag({ grade }) {
  if (!grade) return <span style={{color:'var(--text3)'}}>—</span>;
  const cls = grade.startsWith('A') ? 'grade-A' : grade.startsWith('B') ? 'grade-B' : grade.startsWith('C') ? 'grade-C' : 'grade-D';
  return <span className={`grade ${cls}`}>{grade}</span>;
}

function Avatar({ name, size = 30 }) {
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors = ['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2'];
  const bg = colors[name.charCodeAt(0) % colors.length];
  return <div style={{width:size,height:size,borderRadius:'50%',background:bg,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.36,fontWeight:600,flexShrink:0}}>{initials}</div>;
}

function AuthPage({ onLogin }) {
  const [identifier, setIdentifier] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const data = await api.post('/auth/unified-login', { identifier, password });
      api.setToken(data.data.token);
      onLogin(data.data.user);
    } catch (err) {
      // Demo mode fallback for admin only
      if (identifier === 'admin@studentportal.com' && password === 'admin123') {
        onLogin({ id:1, name:'System Admin', email: identifier, role:'SUPER_ADMIN', type:'admin' }, true);
      } else {
        setError(err.message || 'Invalid credentials.');
      }
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon" style={{fontSize:22}}>🎓</div>

function StudentModal({ student, onClose, onSave }) {
  const { demo, showToast } = useApp();
  const [form, setForm] = useState({ name:'', email:'', phone:'', address:'', dateOfBirth:'', status:'ACTIVE', ...(student||{}) });
  const [loading, setLoading] = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = async () => {
    if (!form.name || !form.email) { showToast('Name and email are required','error'); return; }
    setLoading(true);
    try {
      if (demo) {
        await new Promise(r=>setTimeout(r,400));
        showToast(student ? 'Student updated' : 'Student created','success');
        onSave({ ...form, id: student?.id || Date.now(), studentId: student?.studentId || `STU-2024-${Math.floor(10000+Math.random()*89999)}`, createdAt: new Date().toISOString(), enrollments:[] });
      } else {
        const r = student ? await api.put(`/students/${student.id}`, form) : await api.post('/students', form);
        showToast(student ? 'Student updated' : 'Student created','success');
        onSave(r.data);
      }
      onClose();
    } catch(e) { showToast(e.message,'error'); }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

            <div className="field"><label>Email *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="alice@example.com" /></div>

function Students() {
  const { demo, showToast } = useApp();
  const [students, setStudents] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(1);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const limit = 10;

  const load = useCallback(async () => {
    setLoading(true);
    try {
      if (demo) {
        await new Promise(r=>setTimeout(r,200));
        let list = MOCK.students;
        if (search) list = list.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.email.includes(search)||s.studentId.includes(search));
        if (statusFilter) list = list.filter(s=>s.status===statusFilter);
        setTotal(list.length);
        setStudents(list.slice((page-1)*limit, page*limit));
      } else {
        const r = await api.get(`/students?page=${page}&limit=${limit}&search=${search}&status=${statusFilter}`);
        setStudents(r.data.students); setTotal(r.data.pagination.total);
      }
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  }, [page, search, statusFilter, demo]);

  useEffect(() => { load(); }, [load]);

  const deleteStudent = async (id) => {
    if (!confirm('Delete this student?')) return;
    try {
      if (!demo) await api.del(`/students/${id}`);
      showToast('Student deleted','success');
      setStudents(s=>s.filter(x=>x.id!==id));
      setTotal(t=>t-1);
    } catch(e) { showToast(e.message,'error'); }
  };

  const onSave = (student) => {
    setStudents(prev => {
      const idx = prev.findIndex(s=>s.id===student.id);
      if (idx>=0) { const n=[...prev]; n[idx]=student; return n; }
      return [student,...prev];
    });
  };

  const totalPages = Math.ceil(total/limit);

  return (
    <div>
      <div className="table-container">
        <div className="table-header">
          <div className="table-title">Students <span style={{color:'var(--text3)',fontWeight:400,fontSize:12}}>({total})</span></div>
          <div className="search-bar">
            <input className="search-input" placeholder="Search students…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} />
            <select className="select-input" value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPage(1);}}>
              <option value="">All Status</option>
              <option value="ACTIVE">Active</option>
              <option value="INACTIVE">Inactive</option>
              <option value="GRADUATED">Graduated</option>
              <option value="SUSPENDED">Suspended</option>
            </select>
            <button className="btn primary" onClick={()=>setModal('add')}>+ Add Student</button>
          </div>
        </div>
        {loading ? <Spinner /> : students.length === 0 ? (
          <div className="empty"><div className="empty-icon">👨‍🎓</div><div className="empty-text">No students found</div></div>
        ) : (
          <>
            <table>
              <thead><tr><th>Student</th><th>ID</th><th>Contact</th><th>Status</th><th>Courses</th><th>Actions</th></tr></thead>
              <tbody>
                {students.map(s => (
                  <tr key={s.id}>
                    <td><div className="name-cell"><Avatar name={s.name} size={32} /><div><div style={{fontWeight:500}}>{s.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{s.email}</div></div></div></td>
                    <td><span className="id-badge">{s.studentId}</span></td>
                    <td style={{color:'var(--text2)',fontSize:12}}>{s.phone||'—'}</td>
                    <td><Badge status={s.status} /></td>
                    <td style={{color:'var(--text3)',fontSize:12}}>{s.enrollments?.length||0} courses</td>
                    <td>
                      <div className="actions">
                        <button className="btn sm" onClick={()=>{setSelected(s);setModal('view');}}>View</button>
                        <button className="btn sm" onClick={()=>{setSelected(s);setModal('edit');}}>Edit</button>
                        <button className="btn sm danger" onClick={()=>deleteStudent(s.id)}>Del</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {totalPages > 1 && (
              <div className="pagination">
                <div className="page-info">Showing {((page-1)*limit)+1}–{Math.min(page*limit,total)} of {total}</div>
                <div className="page-btns">
                  <button className="page-btn" onClick={()=>setPage(p=>p-1)} disabled={page===1}>‹</button>
                  {Array.from({length:totalPages},(_, i)=>(
                    <button key={i+1} className={`page-btn ${page===i+1?'active':''}`} onClick={()=>setPage(i+1)}>{i+1}</button>
                  ))}
                  <button className="page-btn" onClick={()=>setPage(p=>p+1)} disabled={page===totalPages}>›</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {(modal==='add') && <StudentModal onClose={()=>setModal(null)} onSave={s=>{onSave(s);setModal(null);}} />}
      {(modal==='edit') && <StudentModal student={selected} onClose={()=>setModal(null)} onSave={s=>{onSave(s);setModal(null);}} />}
      {(modal==='view') && selected && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-head">
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <Avatar name={selected.name} size={40} />
                <div>
                  <div className="modal-title">{selected.name}</div>
                  <span className="id-badge">{selected.studentId}</span>
                </div>
              </div>
              <button className="btn icon-only" onClick={()=>setModal(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="detail-grid" style={{marginBottom:20}}>
                <div className="detail-item"><div className="detail-label">Email</div><div className="detail-value">{selected.email}</div></div>
                <div className="detail-item"><div className="detail-label">Phone</div><div className="detail-value">{selected.phone||'—'}</div></div>
                <div className="detail-item"><div className="detail-label">Status</div><div className="detail-value"><Badge status={selected.status} /></div></div>
                <div className="detail-item"><div className="detail-label">Joined</div><div className="detail-value">{new Date(selected.createdAt).toLocaleDateString()}</div></div>
              </div>
              {selected.enrollments?.length > 0 && (
                <>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Enrollments</div>
                  <table style={{fontSize:12}}>
                    <thead><tr><th style={{padding:'8px 12px'}}>Course</th><th style={{padding:'8px 12px'}}>Grade</th><th style={{padding:'8px 12px'}}>Score</th><th style={{padding:'8px 12px'}}>Status</th></tr></thead>
                    <tbody>
                      {selected.enrollments.map(e=>(
                        <tr key={e.id}>
                          <td style={{padding:'8px 12px'}}><div style={{fontWeight:500}}>{e.course?.code}</div><div style={{fontSize:11,color:'var(--text3)'}}>{e.course?.name}</div></td>
                          <td style={{padding:'8px 12px'}}><GradeTag grade={e.grade} /></td>
                          <td style={{padding:'8px 12px',fontFamily:'DM Mono',fontSize:11}}>{e.score!=null?`${e.score}%`:'—'}</td>
                          <td style={{padding:'8px 12px'}}><Badge status={e.status} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}
            </div>
            <div className="modal-foot">
              <button className="btn" onClick={()=>setModal(null)}>Close</button>
              <button className="btn primary" onClick={()=>setModal('edit')}>Edit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Courses() {
  const { demo, showToast } = useApp();
  const [courses, setCourses] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(1);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);
  const limit = 10;

  const load = useCallback(async () => {
    setLoading(true);
    try {
      if (demo) {
        await new Promise(r=>setTimeout(r,200));
        let list = MOCK.courses;
        if (search) list = list.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.code.includes(search.toUpperCase()));
        setTotal(list.length);
        setCourses(list.slice((page-1)*limit, page*limit));
      } else {
        const r = await api.get(`/courses?page=${page}&limit=${limit}&search=${search}`);
        setCourses(r.data.courses); setTotal(r.data.pagination.total);
      }
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  }, [page, search, demo]);

  useEffect(() => { load(); }, [load]);

  const deleteCourse = async (id) => {
    if (!confirm('Delete this course?')) return;
    try {
      if (!demo) await api.del(`/courses/${id}`);
      setCourses(c=>c.filter(x=>x.id!==id)); setTotal(t=>t-1);
      showToast('Course deleted','success');
    } catch(e) { showToast(e.message,'error'); }
  };

  const onSave = (course) => {
    setCourses(prev => {
      const idx = prev.findIndex(c=>c.id===course.id);
      if (idx>=0) { const n=[...prev]; n[idx]=course; return n; }
      return [course,...prev];
    });
  };

  const totalPages = Math.ceil(total/limit);

  return (
    <div>
      <div className="table-container">
        <div className="table-header">
          <div className="table-title">Courses <span style={{color:'var(--text3)',fontWeight:400,fontSize:12}}>({total})</span></div>
          <div className="search-bar">
            <input className="search-input" placeholder="Search courses…" value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} />
            <button className="btn primary" onClick={()=>setModal('add')}>+ Add Course</button>
          </div>
        </div>
        {loading ? <Spinner /> : courses.length===0 ? (
          <div className="empty"><div className="empty-icon">📚</div><div className="empty-text">No courses found</div></div>
        ) : (
          <>
            <table>
              <thead><tr><th>Course</th><th>Code</th><th>Instructor</th><th>Credits</th><th>Enrollment</th><th>Semester</th><th>Actions</th></tr></thead>
              <tbody>
                {courses.map(c => {
                  const enrolled = c._count?.enrollments || 0;
                  const fillPct = Math.round((enrolled/c.capacity)*100);
                  return (
                    <tr key={c.id}>
                      <td><div style={{fontWeight:500}}>{c.name}</div></td>
                      <td><span className="id-badge">{c.code}</span></td>
                      <td style={{color:'var(--text2)',fontSize:12}}>{c.instructor||'—'}</td>
                      <td style={{textAlign:'center'}}><span className="tag">{c.credits}cr</span></td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{background:'var(--border)',borderRadius:4,height:6,width:60}}>
                            <div style={{background:fillPct>85?'var(--red)':fillPct>60?'var(--amber)':'var(--accent)',height:'100%',borderRadius:4,width:`${Math.min(fillPct,100)}%`}}></div>
                          </div>
                          <span style={{fontSize:11,color:'var(--text3)',fontFamily:'DM Mono'}}>{enrolled}/{c.capacity}</span>
                        </div>
                      </td>
                      <td style={{color:'var(--text3)',fontSize:12}}>{c.semester||'—'}</td>
                      <td>
                        <div className="actions">
                          <button className="btn sm" onClick={()=>{setSelected(c);setModal('edit');}}>Edit</button>
                          <button className="btn sm danger" onClick={()=>deleteCourse(c.id)}>Del</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {totalPages > 1 && (
              <div className="pagination">
                <div className="page-info">Showing {((page-1)*limit)+1}–{Math.min(page*limit,total)} of {total}</div>
                <div className="page-btns">
                  <button className="page-btn" onClick={()=>setPage(p=>p-1)} disabled={page===1}>‹</button>
                  {Array.from({length:totalPages},(_,i)=><button key={i+1} className={`page-btn ${page===i+1?'active':''}`} onClick={()=>setPage(i+1)}>{i+1}</button>)}
                  <button className="page-btn" onClick={()=>setPage(p=>p+1)} disabled={page===totalPages}>›</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {modal==='add' && <CourseModal onClose={()=>setModal(null)} onSave={c=>{onSave(c);setModal(null);}} />}
      {modal==='edit' && <CourseModal course={selected} onClose={()=>setModal(null)} onSave={c=>{onSave(c);setModal(null);}} />}
    </div>
  );
}

// ─── Enrollments ──────────────────────────────────────────────────────────────
function EnrollModal({ onClose, onSave }) {
  const { demo, showToast } = useApp();
  const [studentId, setStudentId] = useState('');
  const [courseId, setCourseId] = useState('');
  const [students] = useState(demo ? MOCK.students.map(s=>({id:s.id,label:`${s.name} (${s.studentId})`})) : []);
  const [courses] = useState(demo ? MOCK.courses.map(c=>({id:c.id,label:`${c.code} — ${c.name}`})) : []);
  const [loading, setLoading] = useState(false);

  const save = async () => {
    if (!studentId || !courseId) { showToast('Select student and course','error'); return; }
    setLoading(true);
    try {
      if (demo) {
        await new Promise(r=>setTimeout(r,400));
        const s = MOCK.students.find(x=>x.id===parseInt(studentId));
        const c = MOCK.courses.find(x=>x.id===parseInt(courseId));
        onSave({ id:Date.now(), studentId:parseInt(studentId), courseId:parseInt(courseId), status:'ENROLLED', grade:null, score:null, createdAt:new Date().toISOString(), student:{name:s?.name,studentId:s?.studentId}, course:{name:c?.name,code:c?.code} });
        showToast('Student enrolled successfully','success');
      } else {
        const r = await api.post('/enrollments', { studentId: parseInt(studentId), courseId: parseInt(courseId) });
        onSave(r.data);
        showToast('Student enrolled','success');
      }
      onClose();
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-title">Enroll Student</div>
          <button className="btn icon-only" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid single">
            <div className="field">
              <label>Student *</label>
              <select value={studentId} onChange={e=>setStudentId(e.target.value)}>
                <option value="">— Select student —</option>
                {students.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Course *</label>
              <select value={courseId} onChange={e=>setCourseId(e.target.value)}>
                <option value="">— Select course —</option>
                {courses.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={save} disabled={loading}>{loading?'Enrolling…':'Enroll'}</button>
        </div>
      </div>
    </div>
  );
}

function GradeModal({ enrollment, onClose, onSave }) {
  const { demo, showToast } = useApp();
  const [grade, setGrade] = useState(enrollment?.grade||'');
  const [score, setScore] = useState(enrollment?.score||'');
  const [status, setStatus] = useState(enrollment?.status||'ENROLLED');
  const [loading, setLoading] = useState(false);

  const save = async () => {
    setLoading(true);
    try {
      if (demo) {
        await new Promise(r=>setTimeout(r,300));
        onSave({ ...enrollment, grade, score: score?parseFloat(score):null, status });
        showToast('Grade updated','success');
      } else {
        const r = await api.put(`/enrollments/${enrollment.id}/grade`, { grade, score, status });
        onSave(r.data);
        showToast('Grade updated','success');
      }
      onClose();
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div className="modal-title">Update Grade</div>
          <button className="btn icon-only" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{marginBottom:16,padding:12,background:'var(--surface2)',borderRadius:8,fontSize:13}}>
            <strong>{enrollment?.student?.name}</strong> — {enrollment?.course?.code} {enrollment?.course?.name}
          </div>
          <div className="form-grid">
            <div className="field"><label>Letter Grade</label><select value={grade} onChange={e=>setGrade(e.target.value)}><option value="">Not graded</option>{['A','A-','B+','B','B-','C+','C','C-','D+','D','F'].map(g=><option key={g} value={g}>{g}</option>)}</select></div>
            <div className="field"><label>Score (%)</label><input type="number" min={0} max={100} step={0.1} value={score} onChange={e=>setScore(e.target.value)} placeholder="85.5" /></div>
            <div className="field span2"><label>Status</label><select value={status} onChange={e=>setStatus(e.target.value)}><option value="ENROLLED">Enrolled</option><option value="COMPLETED">Completed</option><option value="DROPPED">Dropped</option><option value="FAILED">Failed</option></select></div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={save} disabled={loading}>{loading?'Saving…':'Update Grade'}</button>
        </div>
      </div>
    </div>
  );
}

function Enrollments() {
  const { demo, showToast } = useApp();
  const [enrollments, setEnrollments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        if (demo) {
          await new Promise(r=>setTimeout(r,300));
          const all = MOCK.students.flatMap(s=>s.enrollments.map(e=>({...e,student:{name:s.name,studentId:s.studentId}})));
          setEnrollments(all);
        } else {
          // Load all students' enrollments
          const r = await api.get('/students?limit=100');
          const all = r.data.students.flatMap(s=>
            (s.enrollments||[]).map(e=>({...e, student:{name:s.name,studentId:s.studentId}}))
          );
          setEnrollments(all);
        }
      } catch(e) { showToast(e.message,'error'); }
      finally { setLoading(false); }
    })();
  }, [demo]);

  const removeEnrollment = async (id) => {
    if (!confirm('Remove this enrollment?')) return;
    try {
      if (!demo) await api.del(`/enrollments/${id}`);
      setEnrollments(e=>e.filter(x=>x.id!==id));
      showToast('Enrollment removed','success');
    } catch(e) { showToast(e.message,'error'); }
  };

  const onGradeSave = (updated) => {
    setEnrollments(prev=>prev.map(e=>e.id===updated.id?{...e,...updated}:e));
  };

  return (
    <div>
      <div className="table-container">
        <div className="table-header">
          <div className="table-title">Enrollments <span style={{color:'var(--text3)',fontWeight:400,fontSize:12}}>({enrollments.length})</span></div>
          <button className="btn primary" onClick={()=>setModal('enroll')}>+ Enroll Student</button>
        </div>
        {loading ? <Spinner /> : enrollments.length===0 ? (
          <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">No enrollments yet</div></div>
        ) : (
          <table>
            <thead><tr><th>Student</th><th>Course</th><th>Grade</th><th>Score</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
              {enrollments.map(e=>(
                <tr key={e.id}>
                  <td><div style={{fontWeight:500,fontSize:13}}>{e.student?.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>{e.student?.studentId}</div></td>
                  <td><span className="id-badge">{e.course?.code}</span><span style={{marginLeft:8,fontSize:12,color:'var(--text2)'}}>{e.course?.name}</span></td>
                  <td><GradeTag grade={e.grade} /></td>
                  <td style={{fontFamily:'DM Mono',fontSize:12}}>{e.score!=null?`${e.score}%`:'—'}</td>
                  <td><Badge status={e.status} /></td>
                  <td style={{color:'var(--text3)',fontSize:12}}>{new Date(e.createdAt).toLocaleDateString()}</td>
                  <td>
                    <div className="actions">
                      <button className="btn sm" onClick={()=>{setSelected(e);setModal('grade');}}>Grade</button>
                      <button className="btn sm danger" onClick={()=>removeEnrollment(e.id)}>Remove</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {modal==='enroll' && <EnrollModal onClose={()=>setModal(null)} onSave={e=>{setEnrollments(prev=>[e,...prev]);setModal(null);}} />}
      {modal==='grade' && selected && <GradeModal enrollment={selected} onClose={()=>setModal(null)} onSave={updated=>{onGradeSave(updated);setModal(null);}} />}
    </div>
  );
}

                          <td style={{fontSize:12,color:'var(--text2)'}}>{e.course?.semester || '—'}</td>
                          <td style={{fontFamily:'DM Mono',fontSize:12}}>{e.course?.credits}</td>
                          <td><GradeTag grade={e.grade} /></td>
                          <td style={{fontFamily:'DM Mono',fontSize:12}}>{e.score != null ? `${e.score}%` : '—'}</td>
                          <td><Badge status={e.status} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          )}

          {/* Profile */}
          {page === 'profile' && (
            <div style={{maxWidth:560}}>
              <div className="section-card">
                <div className="section-head"><div className="section-title">Personal Information</div></div>
                <div className="section-body">
                  <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
                    <Avatar name={profile.name} size={52} />
                    <div>
                      <div style={{fontWeight:600,fontSize:16}}>{profile.name}</div>
                      <div style={{color:'var(--text3)',fontSize:13}}>{profile.email}</div>
                      <div style={{marginTop:4}}><Badge status={profile.status} /></div>
                    </div>
                  </div>
                  <div className="detail-grid">
                    <div className="detail-item"><div className="detail-label">Student ID</div><div className="detail-value">{profile.studentId}</div></div>
                    <div className="detail-item"><div className="detail-label">Phone</div><div className="detail-value">{profile.phone || '—'}</div></div>
                    <div className="detail-item"><div className="detail-label">Date of Birth</div><div className="detail-value">{profile.dateOfBirth ? new Date(profile.dateOfBirth).toLocaleDateString() : '—'}</div></div>
                    <div className="detail-item"><div className="detail-label">Enrolled Since</div><div className="detail-value">{new Date(profile.createdAt).toLocaleDateString()}</div></div>
                    {profile.address && <div className="detail-item" style={{gridColumn:'span 2'}}><div className="detail-label">Address</div><div className="detail-value">{profile.address}</div></div>}
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [demo, setDemo] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);

  const showToast = useCallback((msg, type='success') => {
    setToast({ msg, type });
  }, []);

  const handleLogin = (userData, isDemo=false) => {
    setUser(userData);
    setDemo(isDemo);
    if (isDemo) showToast('Running in demo mode — backend not connected','success');
  };

  const handleLogout = () => {
    api.setToken(null);
    setUser(null);
    setDemo(false);
  };

  if (!user) return <AuthPage onLogin={handleLogin} />;

  // Route students to their own dashboard
  if (user.type === 'student') {
    return <StudentDashboard user={user} onLogout={handleLogout} />;
  }

  // Admin dashboard
  const titles = { dashboard:'Dashboard', students:'Students', courses:'Courses', enrollments:'Enrollments', settings:'Settings' };

  return (
    <AppCtx.Provider value={{ demo, showToast }}>
      <div className="app">
        <Sidebar page={page} setPage={setPage} admin={user} onLogout={handleLogout} />
        <div className="main">
          <div className="topbar">
            <div className="topbar-title">{titles[page]}</div>
            {demo && <span className="badge" style={{background:'var(--amber-light)',color:'var(--amber)'}}>Demo Mode</span>}
          </div>
          <div className="content">
            {page==='dashboard' && <Dashboard />}
            {page==='students' && <Students />}
            {page==='courses' && <Courses />}
            {page==='enrollments' && <Enrollments />}
            {page==='settings' && <Settings admin={user} />}
          </div>
        </div>
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>

</html>
